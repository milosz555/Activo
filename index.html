    function MapModal({ item, onClose }) {
        const mapRef = useRef(null);
        const mapInstance = useRef(null);
        useEffect(() => {
            if (!mapRef.current || mapInstance.current) return;
            const map = L.map(mapRef.current).setView([item.lat, item.lng], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
            const icon = L.divIcon({ html: `<div style="background:#0b3d91;color:white;padding:6px 10px;border-radius:20px;font-family:Poppins;font-weight:700;font-size:12px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.3)">🎾 ${item.name}</div>`, className: '', iconAnchor: [0, 0] });
            L.marker([item.lat, item.lng], { icon }).addTo(map);
            mapInstance.current = map;
            return () => { map.remove(); mapInstance.current = null; };
        }, [item]);
        return (
            <div className="map-modal" onClick={e => e.target === e.currentTarget && onClose()}>
                <div className="map-modal-content">
                    <div className="map-modal-header">
                        <h3>{item.name}</h3>
                        <button className="btn-close" onClick={onClose}>✕</button>
                    </div>
                    <div id="map-container" ref={mapRef}></div>
                    <div className="map-info-row"><i className="fas fa-map-marker-alt"></i> {item.address}</div>
                    <div className="map-info-row"><i className="fas fa-layer-group"></i> Nawierzchnia: {item.surface}</div>
                    <div className="map-info-row"><i className="fas fa-th-large"></i> Korty: {item.courts}</div>
                    <button className="btn-apply" style={{marginTop:10}} onClick={() => window.open(`https://www.google.com/maps/search/?api=1&query=${item.lat},${item.lng}`, '_blank')}>
                        <i className="fas fa-external-link-alt"></i> Otwórz w Google Maps
                    </button>
                </div>
            </div>
        );
    }

    function translateError(code) {
        const map = {
            'auth/email-already-in-use': 'Ten adres e-mail jest już zarejestrowany.',
            'auth/invalid-email': 'Nieprawidłowy adres e-mail.',
            'auth/weak-password': 'Hasło jest za słabe (min. 6 znaków).',
            'auth/user-not-found': 'Nie znaleziono konta z tym adresem e-mail.',
            'auth/wrong-password': 'Nieprawidłowe hasło.',
            'auth/invalid-credential': 'Nieprawidłowy e-mail lub hasło.',
            'auth/too-many-requests': 'Zbyt wiele prób. Spróbuj ponownie za chwilę.',
        };
        return map[code] || 'Wystąpił błąd. Spróbuj ponownie.';
    }

    function AuthScreen() {
        const [tab, setTab] = useState('login');
        const [name, setName] = useState('');
        const [email, setEmail] = useState('');
        const [password, setPassword] = useState('');
        const [error, setError] = useState('');
        const [success, setSuccess] = useState('');
        const [loading, setLoading] = useState(false);
        const fb = window.__firebase;

        const handleRegister = async () => {
            setError(''); setSuccess('');
            if (!name.trim()) return setError('Podaj swoje imię.');
            if (!email.trim()) return setError('Podaj adres e-mail.');
            if (password.length < 6) return setError('Hasło musi mieć min. 6 znaków.');
            setLoading(true);
            try {
                const cred = await fb.createUserWithEmailAndPassword(fb.auth, email.trim(), password);
                const uid = cred.user.uid;
                await fb.updateProfile(cred.user, { displayName: name.trim() });
                await fb.setDoc(fb.doc(fb.db, 'users', uid), {
                    uid: uid,
                    name: name.trim(),
                    email: email.trim().toLowerCase(),
                    createdAt: fb.serverTimestamp(),
                    role: 'user'
                });
                await fb.signOut(fb.auth);
                setSuccess('Konto utworzone! Teraz się zaloguj.');
                setTab('login');
                setName('');
                setPassword('');
            } catch (e) {
                console.error('Blad rejestracji:', e.code, e.message);
                setError(translateError(e.code));
            }
            setLoading(false);
        };

        const handleLogin = async () => {
            setError(''); setSuccess('');
            if (!email.trim()) return setError('Podaj adres e-mail.');
            if (!password.trim()) return setError('Podaj haslo.');
            setLoading(true);
            try {
                await fb.signInWithEmailAndPassword(fb.auth, email.trim().toLowerCase(), password);
            } catch (e) {
                console.error('Blad logowania:', e.code, e.message);
                setError(translateError(e.code));
            }
            setLoading(false);
        };

        return (
            <div className="auth-container">
                <div className="auth-tabs">
                    <button className={`auth-tab ${tab==='login'?'active':''}`} onClick={() => { setTab('login'); setError(''); setSuccess(''); }}>Logowanie</button>
                    <button className={`auth-tab ${tab==='register'?'active':''}`} onClick={() => { setTab('register'); setError(''); setSuccess(''); }}>Rejestracja</button>
                </div>
                <div className="auth-form">
                    {tab === 'login'
                        ? <><h2>Witaj z powrotem 👋</h2><p>Zaloguj się, aby rezerwować korty.</p></>
                        : <><h2>Utwórz konto 🎾</h2><p>Dołącz do Activo i rezerwuj korty w kilka sekund.</p></>
                    }
                    {tab === 'register' && (
                        <div className="form-group">
                            <label>Imię</label>
                            <input type="text" placeholder="np. Kamil" value={name} onChange={e => setName(e.target.value)} />
                        </div>
                    )}
                    <div className="form-group">
                        <label>Adres e-mail</label>
                        <input type="email" placeholder="twoj@email.pl" value={email} onChange={e => setEmail(e.target.value)} />
                    </div>
                    <div className="form-group">
                        <label>Hasło {tab==='register' && <span style={{color:'#aaa',fontWeight:400}}>(min. 6 znaków)</span>}</label>
                        <input type="password" placeholder="••••••••" value={password} onChange={e => setPassword(e.target.value)}
                            onKeyDown={e => e.key==='Enter' && (tab==='login' ? handleLogin() : handleRegister())} />
                    </div>
                    {error && <div className="auth-error"><i className="fas fa-exclamation-circle"></i> {error}</div>}
                    {success && <div className="auth-success"><i className="fas fa-check-circle"></i> {success}</div>}
                    <button className={`btn-apply ${loading?'btn-loading':''}`} onClick={tab==='login' ? handleLogin : handleRegister}>
                        {loading ? 'Proszę czekać...' : tab==='login' ? 'Zaloguj się' : 'Zarejestruj się'}
                    </button>
                </div>
            </div>
        );
    }

    // ════════════════════════════════════════════════════════════════
    // KOMPONENT: ProfileScreen
    // Wyświetla profil zalogowanego użytkownika z trzema zakładkami:
    //   1. "Profil"     – dane konta + ustawienia prywatności
    //   2. "Historia"   – lista ostatnio rozegranych gier
    //   3. "Edytuj"     – formularz zmiany imienia
    // Dane zapisywane są w Firestore w kolekcji "users/{uid}"
    // ════════════════════════════════════════════════════════════════
    function ProfileScreen({ user }) {
        const fb = window.__firebase;

        // ── Stan zakładek profilu ────────────────────────────────────────
        const [profileTab, setProfileTab] = useState('info'); // 'info' | 'history' | 'edit'

        // ── Stan historii gier ───────────────────────────────────────────
        const [playedList, setPlayedList]     = useState([]);
        const [showAddPlayed, setShowAddPlayed] = useState(false);
        const [selectedCourt, setSelectedCourt] = useState(DATA[0].name);
        const [playedDate, setPlayedDate]     = useState(new Date().toISOString().split('T')[0]);
        // Opcjonalne pola przy dodawaniu gry
        const [playedOpponent, setPlayedOpponent] = useState('');  // z kim grał
        const [playedScore, setPlayedScore]       = useState('');  // wynik np. 6:3
        const [playedResult, setPlayedResult]     = useState('');  // W / L / D
        const [saving, setSaving]             = useState(false);

        // ── Stan edycji imienia ──────────────────────────────────────────
        const [editName, setEditName]     = useState(user.displayName || '');
        const [editSaving, setEditSaving] = useState(false);
        const [editMsg, setEditMsg]       = useState('');

        // ── Stan ustawień prywatności ────────────────────────────────────
        // showFavourites – czy znajomi widzą ulubione obiekty
        // showHistory    – czy znajomi widzą historię gier
        // showSports     – czy znajomi widzą sporty i poziom
        const [showFavourites, setShowFavourites] = useState(true);
        const [showHistory, setShowHistory]       = useState(true);
        const [showSports, setShowSports]         = useState(true);

        // ── Stan sportów i poziomu ───────────────────────────────────────
        // sports – lista { name, level } dodanych przez użytkownika
        const [sports, setSports]         = useState([]);
        const [newSportName, setNewSportName] = useState('');
        const [newSportLevel, setNewSportLevel] = useState('P');
        const [sportSaving, setSportSaving]   = useState(false);

        // Referencja do dokumentu użytkownika w Firestore
        const userDocRef = fb.doc(fb.db, 'users', user.uid);

        // ── Załaduj dane użytkownika z Firestore przy montowaniu ─────────
        useEffect(() => {
            fb.getDoc(userDocRef).then(snap => {
                if (snap.exists()) {
                    const data = snap.data();
                    setPlayedList(data.playedHistory || []);
                    setSports(data.sports || []);
                    // Ustawienia prywatności – domyślnie true jeśli nie ustawione
                    if (data.privacy) {
                        setShowFavourites(data.privacy.showFavourites !== false);
                        setShowHistory(data.privacy.showHistory !== false);
                        setShowSports(data.privacy.showSports !== false);
                    }
                }
            });
        }, [user.uid]);

        // ── Wylogowanie ──────────────────────────────────────────────────
        const handleLogout = async () => { await fb.signOut(fb.auth); };

        // ── Zapis nowej gry do historii ──────────────────────────────────
        // Tworzy obiekt wpisu z obowiązkowymi polami (kort, data)
        // i opcjonalnymi (przeciwnik, wynik, rezultat)
        const addPlayedEntry = async () => {
            setSaving(true);
            const entry = {
                court: selectedCourt,
                date: playedDate,
                addedAt: new Date().toISOString(),
                // Opcjonalne – dodawane tylko jeśli wypełnione
                ...(playedOpponent.trim() && { opponent: playedOpponent.trim() }),
                ...(playedScore.trim()    && { score: playedScore.trim() }),
                ...(playedResult          && { result: playedResult }),
            };
            const newList = [entry, ...playedList].slice(0, 30); // max 30 wpisów
            await fb.setDoc(userDocRef, { playedHistory: newList }, { merge: true });
            setPlayedList(newList);
            // Reset formularza
            setShowAddPlayed(false);
            setPlayedOpponent('');
            setPlayedScore('');
            setPlayedResult('');
            setSaving(false);
        };

        // ── Usunięcie wpisu z historii gier ─────────────────────────────
        const removePlayedEntry = async (idx) => {
            const newList = playedList.filter((_, i) => i !== idx);
            await fb.setDoc(userDocRef, { playedHistory: newList }, { merge: true });
            setPlayedList(newList);
        };

        // ── Zapis zmienionego imienia ────────────────────────────────────
        // Aktualizuje zarówno Firebase Auth (displayName) jak i Firestore
        const saveEditName = async () => {
            if (!editName.trim()) return setEditMsg('Imię nie może być puste.');
            setEditSaving(true);
            try {
                await fb.updateProfile(fb.auth.currentUser, { displayName: editName.trim() });
                await fb.setDoc(userDocRef, { name: editName.trim() }, { merge: true });
                setEditMsg('✅ Imię zostało zaktualizowane!');
            } catch(e) { setEditMsg('Błąd zapisu. Spróbuj ponownie.'); }
            setEditSaving(false);
        };

        // ── Zapis ustawień prywatności ───────────────────────────────────
        // Zapisuje obiekt "privacy" do dokumentu użytkownika w Firestore
        // FriendsScreen czyta te flagi przed wyświetleniem danych znajomego
        const savePrivacy = async (key, value) => {
            const update = { privacy: { showFavourites, showHistory, showSports, [key]: value } };
            await fb.setDoc(userDocRef, update, { merge: true });
        };

        const handlePrivacyToggle = (key, value) => {
            if (key === 'showFavourites') setShowFavourites(value);
            if (key === 'showHistory')    setShowHistory(value);
            if (key === 'showSports')     setShowSports(value);
            savePrivacy(key, value);
        };

        // ── Dodaj sport do listy ─────────────────────────────────────────
        const addSport = async () => {
            if (!newSportName.trim()) return;
            setSportSaving(true);
            const entry = { name: newSportName.trim(), level: newSportLevel };
            const newSports = [...sports, entry];
            setSports(newSports);
            await fb.setDoc(userDocRef, { sports: newSports }, { merge: true });
            setNewSportName('');
            setNewSportLevel('P');
            setSportSaving(false);
        };

        // ── Usuń sport z listy ───────────────────────────────────────────
        const removeSport = async (idx) => {
            const newSports = sports.filter((_, i) => i !== idx);
            setSports(newSports);
            await fb.setDoc(userDocRef, { sports: newSports }, { merge: true });
        };

        // ── Dane pomocnicze ──────────────────────────────────────────────
        const initials = (user.displayName || user.email || 'U').charAt(0).toUpperCase();
        const joinDate  = user.metadata?.creationTime
            ? new Date(user.metadata.creationTime).toLocaleDateString('pl-PL', { year: 'numeric', month: 'long' })
            : '—';

        // Etykieta rezultatu gry (W/L/D)
        const resultLabel = { W: 'Wygrana', L: 'Przegrana', D: 'Remis' };

        return (
            <div>
                {/* ── Nagłówek profilu ── */}
                <div className="profile-header">
                    <div className="profile-avatar-big">{initials}</div>
                    <div className="profile-name">{user.displayName || 'Użytkownik'}</div>
                    <div className="profile-email">{user.email}</div>
                    <button className="btn-edit-profile" onClick={() => setProfileTab('edit')}>
                        <i className="fas fa-pen"></i> Edytuj profil
                    </button>
                </div>

                {/* ── Zakładki profilu ── */}
                <div className="profile-tabs">
                    <button className={`profile-tab ${profileTab==='info'?'active':''}`} onClick={() => setProfileTab('info')}>
                        <i className="fas fa-user"></i> Profil
                    </button>
                    <button className={`profile-tab ${profileTab==='history'?'active':''}`} onClick={() => setProfileTab('history')}>
                        <i className="fas fa-history"></i> Historia
                    </button>
                    <button className={`profile-tab ${profileTab==='edit'?'active':''}`} onClick={() => setProfileTab('edit')}>
                        <i className="fas fa-cog"></i> Ustawienia
                    </button>
                </div>

                <div className="profile-body" style={{marginTop:0}}>

                    {/* ════════════════════════════════════════════════
                        ZAKŁADKA 1: PROFIL – dane konta + prywatność
                    ════════════════════════════════════════════════ */}
                    {profileTab === 'info' && (<>
                        <div className="profile-card">
                            <h4><i className="fas fa-user" style={{color:'var(--primary)',marginRight:6}}></i> Dane konta</h4>
                            <div className="profile-row"><span>Imię</span><span>{user.displayName || '—'}</span></div>
                            <div className="profile-row"><span>E-mail</span><span>{user.email}</span></div>
                            <div className="profile-row"><span>Konto od</span><span>{joinDate}</span></div>
                            <div className="profile-row"><span>Gier w historii</span><span>{playedList.length}</span></div>
                            <div className="profile-row"><span>Status</span><span style={{color:'var(--primary)'}}>✔ Aktywny</span></div>
                        </div>

                        {/* Ustawienia widoczności dla znajomych */}
                        <div className="profile-card">
                            <h4><i className="fas fa-shield-alt" style={{color:'var(--primary)',marginRight:6}}></i> Prywatność</h4>
                            <p style={{fontSize:'0.8em',color:'#aaa',margin:'0 0 10px'}}>Wybierz co widzą Twoi znajomi na Twoim profilu</p>

                            <div className="privacy-row">
                                <div className="privacy-label">
                                    Ulubione obiekty
                                    <small>Znajomi widzą Twoje polubione korty</small>
                                </div>
                                <label className="toggle-wrap">
                                    <input type="checkbox" checked={showFavourites}
                                        onChange={e => handlePrivacyToggle('showFavourites', e.target.checked)} />
                                    <span className="toggle-slider"></span>
                                </label>
                            </div>

                            <div className="privacy-row">
                                <div className="privacy-label">
                                    Historia gier
                                    <small>Znajomi widzą gdzie ostatnio grałeś</small>
                                </div>
                                <label className="toggle-wrap">
                                    <input type="checkbox" checked={showHistory}
                                        onChange={e => handlePrivacyToggle('showHistory', e.target.checked)} />
                                    <span className="toggle-slider"></span>
                                </label>
                            </div>

                            <div className="privacy-row">
                                <div className="privacy-label">
                                    Sporty i poziom
                                    <small>Znajomi widzą Twoje sporty i zaawansowanie</small>
                                </div>
                                <label className="toggle-wrap">
                                    <input type="checkbox" checked={showSports}
                                        onChange={e => handlePrivacyToggle('showSports', e.target.checked)} />
                                    <span className="toggle-slider"></span>
                                </label>
                            </div>
                        </div>
                    </>)}

                    {/* ════════════════════════════════════════════════
                        ZAKŁADKA 2: HISTORIA – lista rozegranych gier
                        Każdy wpis zawiera: kort, datę i opcjonalnie
                        przeciwnika, wynik i rezultat (W/L/D)
                    ════════════════════════════════════════════════ */}
                    {profileTab === 'history' && (
                        <div className="profile-card">
                            <h4 style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                <span><i className="fas fa-history" style={{color:'var(--primary)',marginRight:6}}></i> Ostatnio grałem</span>
                                <button className="btn-add-small" style={{width:'auto',padding:'5px 12px'}} onClick={() => setShowAddPlayed(!showAddPlayed)}>
                                    <i className="fas fa-plus"></i> Dodaj
                                </button>
                            </h4>

                            {/* Formularz dodawania nowej gry */}
                            {showAddPlayed && (
                                <div className="add-played-form">
                                    {/* Pole wymagane: obiekt */}
                                    <label style={{fontSize:'0.8em',fontWeight:600,color:'#555',display:'block',marginBottom:4}}>Obiekt *</label>
                                    <select value={selectedCourt} onChange={e => setSelectedCourt(e.target.value)}>
                                        {DATA.map(d => <option key={d.id} value={d.name}>{d.name}</option>)}
                                    </select>

                                    {/* Pole wymagane: data */}
                                    <label style={{fontSize:'0.8em',fontWeight:600,color:'#555',display:'block',marginBottom:4}}>Data *</label>
                                    <input type="date" value={playedDate} onChange={e => setPlayedDate(e.target.value)} />

                                    {/* Pole opcjonalne: przeciwnik */}
                                    <label style={{fontSize:'0.8em',fontWeight:600,color:'#aaa',display:'block',marginBottom:4}}>
                                        Z kim grałem? <span style={{fontWeight:400}}>(opcjonalnie)</span>
                                    </label>
                                    <input type="text" placeholder="np. Kamil" value={playedOpponent} onChange={e => setPlayedOpponent(e.target.value)} />

                                    {/* Pole opcjonalne: wynik */}
                                    <label style={{fontSize:'0.8em',fontWeight:600,color:'#aaa',display:'block',marginBottom:4}}>
                                        Wynik <span style={{fontWeight:400}}>(opcjonalnie, np. 6:3)</span>
                                    </label>
                                    <input type="text" placeholder="np. 6:3" value={playedScore} onChange={e => setPlayedScore(e.target.value)} />

                                    {/* Pole opcjonalne: rezultat */}
                                    <label style={{fontSize:'0.8em',fontWeight:600,color:'#aaa',display:'block',marginBottom:4}}>
                                        Rezultat <span style={{fontWeight:400}}>(opcjonalnie)</span>
                                    </label>
                                    <select value={playedResult} onChange={e => setPlayedResult(e.target.value)}>
                                        <option value="">— nie podawaj —</option>
                                        <option value="W">🏆 Wygrana</option>
                                        <option value="L">❌ Przegrana</option>
                                        <option value="D">🤝 Remis</option>
                                    </select>

                                    <button className="btn-add-small" onClick={addPlayedEntry} disabled={saving}>
                                        {saving ? 'Zapisywanie...' : '✔ Zapisz grę'}
                                    </button>
                                </div>
                            )}

                            {/* Lista wpisów */}
                            {playedList.length === 0 && !showAddPlayed
                                ? <div className="section-empty">Brak wpisów — dodaj gdzie ostatnio grałeś!</div>
                                : playedList.map((entry, idx) => (
                                    <div key={idx} className="played-entry">
                                        <div className="played-entry-left">
                                            <strong>
                                                🎾 {entry.court}
                                                {/* Badge rezultatu jeśli podany */}
                                                {entry.result && <span className={`result-badge result-${entry.result}`} style={{marginLeft:6}}>
                                                    {resultLabel[entry.result]}
                                                </span>}
                                            </strong>
                                            <span>{new Date(entry.date).toLocaleDateString('pl-PL', {day:'numeric',month:'long',year:'numeric'})}</span>
                                            {/* Szczegóły opcjonalne */}
                                            <div className="played-entry-details">
                                                {entry.opponent && <span><i className="fas fa-user"></i> {entry.opponent}</span>}
                                                {entry.score    && <span><i className="fas fa-table-tennis"></i> {entry.score}</span>}
                                            </div>
                                        </div>
                                        <div className="played-entry-right" onClick={() => removePlayedEntry(idx)} title="Usuń wpis">
                                            <i className="fas fa-times"></i>
                                        </div>
                                    </div>
                                ))
                            }
                        </div>
                    )}

                    {/* ════════════════════════════════════════════════
                        ZAKŁADKA 3: USTAWIENIA – edycja imienia
                    ════════════════════════════════════════════════ */}
                    {profileTab === 'edit' && (
                        <div className="profile-card">
                            <h4><i className="fas fa-pen" style={{color:'var(--primary)',marginRight:6}}></i> Edytuj profil</h4>

                            <div className="form-group">
                                <label style={{fontSize:'0.82em',fontWeight:600,color:'#555',display:'block',marginBottom:6}}>Imię wyświetlane</label>
                                <input type="text" value={editName} onChange={e => setEditName(e.target.value)}

    // KOMPONENT: FriendProfileModal
    // Wyświetla pełny profil znajomego po kliknięciu jego imienia.
    // Respektuje ustawienia prywatności znajomego (privacy.*).
    // ════════════════════════════════════════════════════════════════
    function FriendProfileModal({ friend, onClose }) {
        if (!friend) return null;

        // Odczyt flag prywatności z danych znajomego
        const canSeeFav     = friend.privacy?.showFavourites !== false;
        const canSeeHistory = friend.privacy?.showHistory    !== false;
        const canSeeSports  = friend.privacy?.showSports     !== false;

        const favItems = canSeeFav ? DATA.filter(d => (friend.favourites||[]).includes(d.id)) : [];
        const played   = canSeeHistory ? (friend.playedHistory||[]) : [];

        // Etykiety poziomów zaawansowania
        const levelMap = { P: 'Początkujący', S: 'Średniozaawansowany', Z: 'Zaawansowany', A: 'Amator wyczynowy' };

        return (
            <div className="friend-profile-modal" onClick={e => e.target === e.currentTarget && onClose()}>
                <div className="friend-profile-sheet">
                    {/* Nagłówek profilu znajomego */}
                    <div className="friend-profile-header">
                        <button className="friend-profile-close" onClick={onClose}>✕</button>
                        <div className="profile-avatar-big" style={{margin:'0 auto 10px'}}>{initials}</div>
                        <div className="profile-name">{friend.name}</div>
                        {/* Sporty i poziom jeśli widoczne */}
                        {canSeeSports && (friend.sports||[]).length > 0 && (

                                {(friend.sports||[]).map((s,i) => (
                                    <span key={i} style={{background:'rgba(255,255,255,0.2)',color:'white',padding:'2px 10px',borderRadius:20,fontSize:'0.75em',fontWeight:600}}>
                                        {s.name} · <span className={`level-badge level-${s.level}`} style={{background:'transparent',padding:0}}>{levelMap[s.level]||s.level}</span>
                                    </span>
                                ))}
                            </div>
                        )}
                    </div>

                    <div className="friend-profile-body">
                        {/* Ulubione obiekty */}
                        <div className="fp-card">
                            <h4><i className="fas fa-heart" style={{color:'#e74c3c',marginRight:6}}></i> Ulubione obiekty</h4>
                            {!canSeeFav
                                ? <div className="hidden-info">🔒 Użytkownik ukrył ulubione</div>
                                : favItems.length === 0
                                    ? <div className="hidden-info">Brak ulubionych obiektów</div>
                                    : <div className="friend-fav-list">{favItems.map(item => <span key={item.id} className="friend-fav-tag">🎾 {item.name}</span>)}</div>
                            }
                        </div>

                        {/* Historia gier */}
                        <div className="fp-card">
                            <h4><i className="fas fa-history" style={{color:'var(--primary)',marginRight:6}}></i> Historia gier</h4>
                            {!canSeeHistory
                                ? <div className="hidden-info">🔒 Użytkownik ukrył historię</div>
                                : played.length === 0
                                    ? <div className="hidden-info">Brak wpisów</div>
                                    : played.map((p,i) => (
                                        <div key={i} className="fp-row">
                                            <span>🎾 {p.court} {p.opponent && `· vs ${p.opponent}`}</span>
                                            <span>
                                                {p.result && <span className={`result-badge result-${p.result}`} style={{marginRight:4}}>{resultLabel[p.result]}</span>}
                                                {new Date(p.date).toLocaleDateString('pl-PL',{day:'numeric',month:'short'})}
                                            </span>
                                        </div>
                                    ))
                            }
                        </div>

                        {/* Sporty i poziom */}
                        {canSeeSports && (friend.sports||[]).length > 0 && (
                            <div className="fp-card">
                                <h4><i className="fas fa-medal" style={{color:'var(--primary)',marginRight:6}}></i> Sporty i poziom</h4>
                                {(friend.sports||[]).map((s,i) => (
                                    <div key={i} className="fp-row">
                                        <span>{s.name}</span>
                                        <span className={`level-badge level-${s.level}`}>{levelMap[s.level]||s.level}</span>

    // ════════════════════════════════════════════════════════════════
    // KOMPONENT: FriendsScreen
    // Zarządza znajomymi użytkownika. Obsługuje:
    //   - System zaproszeń (wyślij → czeka na akceptację → akceptuj/odrzuć)
    //   - Wyszukiwanie po imieniu lub e-mailu
    //   - Kliknięcie imienia → otwiera FriendProfileModal
    //
    // Struktura danych w Firestore (users/{uid}):
    //   friends[]       – UID zaakceptowanych znajomych
    //   sentInvites[]   – UID do których wysłano zaproszenie (oczekuje)
    //   pendingInvites[]– UID którzy zaprosili tego usera (czeka na odpowiedź)
    // ════════════════════════════════════════════════════════════════
    function FriendsScreen({ user }) {
        const fb = window.__firebase;
        const [subTab, setSubTab]           = useState('friends');
        const [searchQuery, setSearchQuery] = useState('');
        const [searchResults, setSearchResults] = useState([]);
        const [searching, setSearching]     = useState(false);
        const [searchError, setSearchError] = useState('');

        // Zaakceptowani znajomi
        const [friends, setFriends]         = useState([]);
        const [friendsData, setFriendsData] = useState([]);
        // Zaproszenia oczekujące na akceptację (ktoś mnie zaprosił)
        const [pending, setPending]         = useState([]);
        const [pendingData, setPendingData] = useState([]);
        // UID do których wysłałem zaproszenie (czekam na odpowiedź)
        const [sentInvites, setSentInvites] = useState([]);

        const [loadingFriends, setLoadingFriends] = useState(true);
        // Stan modala profilu znajomego
        const [viewFriend, setViewFriend]   = useState(null);

        const userRef = fb.doc(fb.db, 'users', user.uid);

        // Załaduj znajomych i zaproszenia przy starcie
        useEffect(() => {
            if (!user) return;
            fb.getDoc(userRef).then(async snap => {
                if (!snap.exists()) { setLoadingFriends(false); return; }
                const data = snap.data();
                const friendUids  = data.friends        || [];
                const pendingUids = data.pendingInvites || [];
                const sentUids    = data.sentInvites    || [];

                setFriends(friendUids);
                setSentInvites(sentUids);
                setPending(pendingUids);

                // Załaduj dane znajomych i oczekujących równolegle
                const [friendSnaps, pendingSnaps] = await Promise.all([
                    Promise.all(friendUids.map(uid => fb.getDoc(fb.doc(fb.db, 'users', uid)))),
                    Promise.all(pendingUids.map(uid => fb.getDoc(fb.doc(fb.db, 'users', uid)))),
                ]);
                setFriendsData(friendSnaps.filter(s => s.exists()).map(s => ({ uid: s.id, ...s.data() })));
                setPendingData(pendingSnaps.filter(s => s.exists()).map(s => ({ uid: s.id, ...s.data() })));
                setLoadingFriends(false);
            });
        }, [user?.uid]);

        // Wyszukaj użytkowników po imieniu lub e-mailu
        const handleSearch = async () => {
            setSearchError('');
            if (searchQuery.trim().length < 2) return setSearchError('Wpisz min. 2 znaki.');
            setSearching(true);
            try {
                const snap = await fb.getDocs(fb.collection(fb.db, 'users'));
                const term = searchQuery.trim().toLowerCase();
                const results = snap.docs
                    .map(d => ({ uid: d.id, ...d.data() }))
                    .filter(u => u.uid !== user.uid &&
                        ((u.name||'').toLowerCase().includes(term) ||
                         (u.email||'').toLowerCase().includes(term)));
                setSearchResults(results);
                if (results.length === 0) setSearchError('Nie znaleziono użytkowników.');
            } catch(e) { setSearchError('Błąd wyszukiwania.'); }
            setSearching(false);
        };

        // Wyślij zaproszenie do znajomego
        // Dodaje UID do sentInvites nadawcy i pendingInvites odbiorcy
        const sendInvite = async (targetUid) => {
            const newSent = [...sentInvites, targetUid];
            setSentInvites(newSent);
            // Zaktualizuj moją listę wysłanych zaproszeń
            await fb.setDoc(userRef, { sentInvites: newSent }, { merge: true });
            // Dodaj mój UID do listy oczekujących odbiorcy
            const targetRef = fb.doc(fb.db, 'users', targetUid);
            const targetSnap = await fb.getDoc(targetRef);
            const targetPending = targetSnap.exists() ? (targetSnap.data().pendingInvites || []) : [];
            if (!targetPending.includes(user.uid)) {
                await fb.setDoc(targetRef, { pendingInvites: [...targetPending, user.uid] }, { merge: true });
            }
        };

        // Akceptuj zaproszenie od kogoś
        // Dodaje obie strony do swoich list friends i czyści zaproszenia
        const acceptInvite = async (senderUid) => {
            // Dodaj do znajomych po obu stronach
            const myNewFriends     = [...friends, senderUid];
            const newPending       = pending.filter(id => id !== senderUid);
            setFriends(myNewFriends);
            setPending(newPending);
            setPendingData(prev => prev.filter(p => p.uid !== senderUid));

            // Zaktualizuj mój dokument
            await fb.setDoc(userRef, { friends: myNewFriends, pendingInvites: newPending }, { merge: true });

            // Zaktualizuj dokument nadawcy — dodaj mnie do jego znajomych i wyczyść sentInvites
            const senderRef  = fb.doc(fb.db, 'users', senderUid);
            const senderSnap = await fb.getDoc(senderRef);
            if (senderSnap.exists()) {
                const senderData    = senderSnap.data();
                const senderFriends = [...(senderData.friends || []), user.uid];
                const senderSent    = (senderData.sentInvites || []).filter(id => id !== user.uid);
                await fb.setDoc(senderRef, { friends: senderFriends, sentInvites: senderSent }, { merge: true });
            }

            // Załaduj dane nowego znajomego do listy
            const snap = await fb.getDoc(fb.doc(fb.db, 'users', senderUid));
            if (snap.exists()) setFriendsData(prev => [...prev, { uid: snap.id, ...snap.data() }]);
        };

        // Odrzuć zaproszenie
        const declineInvite = async (senderUid) => {
            const newPending = pending.filter(id => id !== senderUid);
            setPending(newPending);
            setPendingData(prev => prev.filter(p => p.uid !== senderUid));
            await fb.setDoc(userRef, { pendingInvites: newPending }, { merge: true });
            // Wyczyść sentInvites u nadawcy
            const senderRef  = fb.doc(fb.db, 'users', senderUid);
            const senderSnap = await fb.getDoc(senderRef);
            if (senderSnap.exists()) {
                const senderSent = (senderSnap.data().sentInvites || []).filter(id => id !== user.uid);
                await fb.setDoc(senderRef, { sentInvites: senderSent }, { merge: true });
            }
        };

        // Usuń znajomego z obu stron
        const removeFriend = async (friendUid) => {
            const newFriends = friends.filter(id => id !== friendUid);
            setFriends(newFriends);
            setFriendsData(prev => prev.filter(f => f.uid !== friendUid));
            await fb.setDoc(userRef, { friends: newFriends }, { merge: true });
            // Usuń z listy znajomego po jego stronie
            const friendRef  = fb.doc(fb.db, 'users', friendUid);
            const friendSnap = await fb.getDoc(friendRef);
            if (friendSnap.exists()) {
                const theirFriends = (friendSnap.data().friends || []).filter(id => id !== user.uid);
                await fb.setDoc(friendRef, { friends: theirFriends }, { merge: true });
            }
        };

        if (!user) {
            return (
                <div className="lock-banner" style={{marginTop:20}}>
                    <i className="fas fa-lock"></i>
                    <p>Ta sekcja jest dostępna tylko dla zalogowanych użytkowników.</p>
                    <button className="btn-apply" style={{marginTop:0}} onClick={() => window.__setView('auth')}>Zaloguj się</button>
                </div>
            );
        }

        return (
            <div className="container">
                {/* Modal profilu znajomego */}
                {viewFriend && <FriendProfileModal friend={viewFriend} onClose={() => setViewFriend(null)} />}

                {/* Zakładki: Znajomi / Szukaj */}
                <div className="tabs-mini">
                    <button className={`tab-mini ${subTab==='friends'?'active':''}`} onClick={() => setSubTab('friends')}>
                        <i className="fas fa-user-friends"></i> Znajomi ({friends.length})
                        {pending.length > 0 && <span className="invite-badge">{pending.length}</span>}
                    </button>
                    <button className={`tab-mini ${subTab==='search'?'active':''}`} onClick={() => setSubTab('search')}>
                        <i className="fas fa-search"></i> Szukaj
                    </button>
                </div>

                {/* ── Zakładka SZUKAJ ── */}
                {subTab === 'search' && (
                    <div>
                        <div className="friends-search-bar">
                            <input type="text" placeholder="Imię lub adres e-mail..." value={searchQuery}
                                onChange={e => setSearchQuery(e.target.value)}
                                onKeyDown={e => e.key==='Enter' && handleSearch()} />
                            <button className="btn-search" onClick={handleSearch} disabled={searching}>
                                {searching ? <i className="fas fa-spinner fa-spin"></i> : <i className="fas fa-search"></i>}
                            </button>
                        </div>
                        {searchError && <div style={{color:'#888',fontSize:'0.85em',textAlign:'center',marginBottom:12}}>{searchError}</div>}
                        {searchResults.map(result => (
                            <div key={result.uid} className="search-result-card">
                                <div className="friend-card-header">
                                    <div className="friend-avatar">{(result.name||'?').charAt(0).toUpperCase()}</div>
                                    <div className="friend-info">
                                        <h5>{result.name}</h5>
                                        <span style={{fontSize:'0.75em',color:'#888'}}>
                                            {friends.includes(result.uid) ? '✔ Znajomy' :
                                             sentInvites.includes(result.uid) ? '⏳ Zaproszenie wysłane' : 'Użytkownik Activo'}
                                        </span>
                                    </div>
                                    {/* Przyciski zależne od stanu relacji */}
                                    {friends.includes(result.uid)
                                        ? <button className="btn-remove-friend" onClick={() => removeFriend(result.uid)}>Usuń</button>
                                        : sentInvites.includes(result.uid)
                                            ? <button className="btn-pending" disabled>Wysłano</button>
                                            : <button className="btn-add-friend" onClick={() => sendInvite(result.uid)}>+ Zaproś</button>
                                    }
                                </div>
                            </div>
                        ))}
                    </div>
                )}

                {/* ── Zakładka ZNAJOMI ── */}
                {subTab === 'friends' && (
                    <div>
                        {/* Oczekujące zaproszenia */}
                        {pendingData.length > 0 && (
                            <>
                                <div style={{fontSize:'0.78em',fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:8}}>
                                    Zaproszenia ({pendingData.length})
                                </div>
                                {pendingData.map(sender => (
                                    <div key={sender.uid} className="invite-card">
                                        <div className="invite-card-header">
                                            <div className="friend-avatar" style={{width:38,height:38,fontSize:'0.95em'}}>
                                                {(sender.name||'?').charAt(0).toUpperCase()}
                                            </div>
                                            <div className="friend-info">
                                                <h5>{sender.name}</h5>
                                                <span style={{fontSize:'0.75em',color:'#aaa'}}>Chce Cię dodać do znajomych</span>
                                            </div>
                                        </div>
                                        <div className="invite-actions">
                                            <button className="btn-accept" onClick={() => acceptInvite(sender.uid)}>✔ Akceptuj</button>
                                            <button className="btn-decline" onClick={() => declineInvite(sender.uid)}>✕ Odrzuć</button>
                                        </div>
                                    </div>
                                ))}
                                <div style={{fontSize:'0.78em',fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'0.05em',margin:'16px 0 8px'}}>
                                    Znajomi ({friendsData.length})
                                </div>
                            </>
                        )}

                        {loadingFriends && <div className="section-empty">Ładowanie...</div>}
                        {!loadingFriends && friendsData.length === 0 && pendingData.length === 0 && (
                            <div className="section-empty">Brak znajomych — przejdź do "Szukaj" i zaproś kogoś!</div>
                        )}

                        {/* Lista zaakceptowanych znajomych — kliknięcie imienia otwiera profil */}
                        {friendsData.map(friend => (
                            <div key={friend.uid} className="friend-card">
                                <div className="friend-card-header">
                                    <div className="friend-avatar" style={{cursor:'pointer'}} onClick={() => setViewFriend(friend)}>
                                        {(friend.name||'?').charAt(0).toUpperCase()}
                                    </div>
                                    <div className="friend-info" style={{cursor:'pointer'}} onClick={() => setViewFriend(friend)}>
                                        <h5 style={{color:'var(--dark)'}}>{friend.name} <i className="fas fa-chevron-right" style={{fontSize:'0.7em',color:'#ccc'}}></i></h5>
                                        <span>
                                            {friend.privacy?.showSports !== false && (friend.sports||[]).length > 0
                                                ? (friend.sports||[]).map(s => s.name).join(', ')
                                                : 'Kliknij aby zobaczyć profil'}
                                        </span>
                                    </div>
                                    <button className="btn-remove-friend" onClick={() => removeFriend(friend.uid)}>Usuń</button>
                                </div>
                            </div>
                        ))}
                    </div>
                )}
            </div>
        );
    }

    function App() {
        const [view, setView] = useState('home');
        const [leftMenu, setLeftMenu] = useState(false);
        const [filterPanel, setFilterPanel] = useState(false);
        const [filtered, setFiltered] = useState(DATA);
        const [mapItem, setMapItem] = useState(null);
        const [user, setUser] = useState(undefined);
        const [favourites, setFavourites] = useState([]);
        const [f, setF] = useState({ parking: 'all', surface: 'all', shop: 'all', testRackets: 'all' });

        // Globalny setter widoku dla FavouritesScreen
        window.__setView = setView;

        useEffect(() => {
            const interval = setInterval(() => {
                if (window.__firebase) {
                    clearInterval(interval);
                    const unsub = window.__firebase.onAuthStateChanged(window.__firebase.auth, u => {
                        setUser(u || null);
                        if (u) {
                            setView(v => v === 'auth' ? 'profile' : v);
                            // Załaduj ulubione z Firestore
                            window.__firebase.getDoc(window.__firebase.doc(window.__firebase.db, 'users', u.uid))
                                .then(snap => { if (snap.exists()) setFavourites(snap.data().favourites || []); });
                        } else {
                            setFavourites([]);
                        }
                    });
                }
            }, 100);
        }, []);

        const toggleFav = async (itemId) => {
            if (!user) { setView('auth'); return; }
            const fb = window.__firebase;
            const userRef = fb.doc(fb.db, 'users', user.uid);
            const isFav = favourites.includes(itemId);
            const newFavs = isFav ? favourites.filter(id => id !== itemId) : [...favourites, itemId];
            setFavourites(newFavs);
            await fb.setDoc(userRef, { favourites: newFavs }, { merge: true });
        };

        const applyFilters = () => {
            const res = DATA.filter(item =>
                (f.parking==='all' || item.parking===f.parking) &&
                (f.surface==='all' || item.surface===f.surface) &&
                (f.shop==='all' || item.shop===f.shop) &&
                (f.testRackets==='all' || item.testRackets===f.testRackets)
            );
            setFiltered(res); setFilterPanel(false);
        };

        const initials = user?.displayName?.charAt(0).toUpperCase() || user?.email?.charAt(0).toUpperCase() || null;

        return (
            <div>
                <div className={`overlay ${(leftMenu||filterPanel)?'show':''}`} onClick={() => { setLeftMenu(false); setFilterPanel(false); }}></div>
                {mapItem && <MapModal item={mapItem} onClose={() => setMapItem(null)} />}

                <div className={`side-panel panel-left ${leftMenu?'open':''}`}>
                    <a href="#" style={{color:'white',display:'block',padding:'15px 0'}} onClick={() => { setView('home'); setLeftMenu(false); }}>Strona Główna</a>
                    <a href="#" style={{color:'white',display:'block',padding:'15px 0'}} onClick={() => { setView('search'); setLeftMenu(false); }}>Wyszukiwarka</a>
                    <a href="#" style={{color:'white',display:'block',padding:'15px 0'}} onClick={() => { setView('favourites'); setLeftMenu(false); }}>
                        <i className="fas fa-heart" style={{marginRight:8,color:'#e74c3c'}}></i>
                        Ulubione {user && favourites.length > 0 && <span style={{background:'#e74c3c',color:'white',borderRadius:'20px',padding:'1px 7px',fontSize:'0.75em',marginLeft:4}}>{favourites.length}</span>}
                    </a>
                    {user && <a href="#" style={{color:'white',display:'block',padding:'15px 0'}} onClick={() => { setView('friends'); setLeftMenu(false); }}>
                        <i className="fas fa-user-friends" style={{marginRight:8,color:'#3498db'}}></i>
                        Znajomi
                    </a>}
                    <a href="#" style={{color:'white',display:'block',padding:'15px 0'}} onClick={() => { setView(user ? 'profile' : 'auth'); setLeftMenu(false); }}>
                        {user ? 'Mój profil' : 'Zaloguj się'}
                    </a>
                </div>

                <div className={`side-panel panel-right ${filterPanel?'open':''}`}>
                    <h3>Filtry zaawansowane</h3>
                    <div className="filter-item"><label>Typ nawierzchni</label>
                        <select value={f.surface} onChange={e => setF({...f,surface:e.target.value})}>
                            <option value="all">Wszystkie</option><option value="ziemna">Ziemna</option><option value="twarda">Twarda</option><option value="dywan">Dywan</option>
                        </select></div>
                    <div className="filter-item"><label>Sklep na miejscu</label>
                        <select value={f.shop} onChange={e => setF({...f,shop:e.target.value})}>
                            <option value="all">Obojętnie</option><option value="Tak">Tak</option><option value="Nie">Nie</option>
                        </select></div>
                    <div className="filter-item"><label>Rakiety testowe</label>
                        <select value={f.testRackets} onChange={e => setF({...f,testRackets:e.target.value})}>
                            <option value="all">Obojętnie</option><option value="Tak">Tak</option><option value="Nie">Nie</option>
                        </select></div>
                    <div className="filter-item"><label>Parking</label>
                        <select value={f.parking} onChange={e => setF({...f,parking:e.target.value})}>
                            <option value="all">Obojętnie</option><option value="Tak">Tak</option><option value="Nie">Nie</option>
                        </select></div>
                    <button className="btn-apply" onClick={applyFilters}>ZASTOSUJ FILTRY</button>
                </div>

                <nav className="top-nav">
                    <div onClick={() => setLeftMenu(true)}><i className="fas fa-bars"></i></div>
                    <div style={{fontWeight:700}}>ACTIVO</div>
                    <div className="nav-user">
                        {user === undefined
                            ? <i className="fas fa-circle-notch fa-spin"></i>
                            : user
                                ? <div className="nav-avatar" onClick={() => setView('profile')}>{initials}</div>
                                : <span style={{fontSize:'0.8em',cursor:'pointer'}} onClick={() => setView('auth')}>Zaloguj</span>
                        }
                    </div>
                </nav>

                {view === 'home' && (
                    <div className="container">
                        <div className="hero-card">
                            <h2>Znajdź swój kort 🎾</h2>
                            <p>Skorzystaj z wyszukiwarki, aby filtrować po nawierzchni i usługach.</p>
                            <button className="btn-apply" style={{marginTop:0}} onClick={() => setView('search')}>Przejdź do szukania</button>
                        </div>
                        {!user && (
                            <div className="card" style={{padding:'20px'}}>
                                <p style={{margin:'0 0 8px',fontWeight:600,color:'var(--dark)'}}>Masz już konto?</p>
                                <p style={{margin:'0 0 12px',fontSize:'0.85em',color:'#888'}}>Zaloguj się, żeby rezerwować korty i śledzić historię rezerwacji.</p>
                                <button className="btn-apply" style={{marginTop:0}} onClick={() => setView('auth')}>Zaloguj / Zarejestruj się</button>
                            </div>
                        )}
                    </div>
                )}

                {view === 'search' && (
                    <div className="container">
                        <button className="btn-more" onClick={() => setFilterPanel(true)}>
                            <i className="fas fa-sliders-h"></i> Więcej filtrów
                        </button>
                        <h4>Dostępne obiekty ({filtered.length})</h4>
                        {filtered.map(item => (
                            <div key={item.id} className="card">
                                <img src={item.img} alt={item.name} />
                                <div className="card-body">
                                    <h4 style={{margin:'0'}}>
                                        {item.name}
                                        <span className="courts-badge"><i className="fas fa-th-large"></i> {item.courts} kortów</span>
                                    </h4>
                                    <div className="card-address"><i className="fas fa-map-marker-alt"></i>{item.address}</div>
                                    <div className="stats-grid">
                                        <div className="prop"><i className="fas fa-layer-group"></i> {item.surface}</div>
                                        <div className="prop"><i className="fas fa-shopping-cart"></i> Sklep: {item.shop}</div>
                                        <div className="prop"><i className="fas fa-circle"></i> Testy: {item.testRackets}</div>
                                        <div className="prop"><i className="fas fa-car"></i> Parking: {item.parking}</div>
                                    </div>
                                    <div className="card-actions">
                                        <button className="btn-map" onClick={() => setMapItem(item)}>
                                            <i className="fas fa-map-marked-alt"></i> Mapa
                                        </button>
                                        <button className="btn-heart" onClick={() => toggleFav(item.id)} title={favourites.includes(item.id) ? 'Usuń z ulubionych' : 'Dodaj do ulubionych'}>
                                            {favourites.includes(item.id) ? '❤️' : '🤍'}
                                        </button>
                                        <button className="btn-reserve" onClick={() => user ? alert('Rezerwacja: ' + item.name) : setView('auth')}>
                                            {user ? 'Zarezerwuj' : 'Zaloguj się'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                )}

                {view === 'auth' && <AuthScreen />}
                {view === 'profile' && (user ? <ProfileScreen user={user} /> : <AuthScreen />)}
                {view === 'favourites' && <FavouritesScreen user={user} favourites={favourites} onToggleFav={toggleFav} />}
                {view === 'friends' && <FriendsScreen user={user} />}

                <nav className="bottom-nav">
                    <div className={`bottom-nav-item ${view==='home'?'active':''}`} onClick={() => setView('home')}>
                        <i className="fas fa-home"></i> Główna
                    </div>
                    <div className={`bottom-nav-item ${view==='search'?'active':''}`} onClick={() => setView('search')}>
                        <i className="fas fa-search"></i> Szukaj
                    </div>
                    <div className={`bottom-nav-item ${view==='favourites'?'active':''}`} onClick={() => setView('favourites')}>
                        <i className="fas fa-heart"></i> Ulubione
                    </div>
                    {user && <div className={`bottom-nav-item ${view==='friends'?'active':''}`} onClick={() => setView('friends')}>
                        <i className="fas fa-user-friends"></i> Znajomi
                    </div>}
                    <div className={`bottom-nav-item ${view==='auth'||view==='profile'?'active':''}`} onClick={() => setView(user ? 'profile' : 'auth')}>
                        <i className="fas fa-user"></i> {user ? 'Profil' : 'Konto'}
                    </div>
                </nav>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>

</body>
</html>
